    }

        background: linear-gradient(135deg, #f5e6b2, #ffcc66, #ffaa33);
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
        letter-spacing: 2px;
        margin-bottom: 0.3rem;
    }
    .header p {
        color: #8e9bbe;
        font-size: 0.9rem;
    }
    .badge-row {
        display: flex;
        justify-content: center;
        gap: 0.8rem;
        margin-top: 0.8rem;
        flex-wrap: wrap;
    }
    .badge {
        background: rgba(255, 204, 102, 0.15);
        border: 1px solid rgba(255, 204, 102, 0.3);
        border-radius: 40px;
        padding: 4px 14px;
        font-size: 0.7rem;
        color: #ffdd99;
    }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 1rem;
        margin-bottom: 2rem;
        align-items: center;
    }
    .search-box {
        background: rgba(20, 28, 48, 0.8);
        backdrop-filter: blur(6px);
        border: 1px solid rgba(255, 204, 102, 0.35);
        border-radius: 60px;
        padding: 0.5rem 1.2rem;
        display: flex;
        align-items: center;
        gap: 0.7rem;
        transition: all 0.2s;
    }
    .search-box:focus-within {
        border-color: #ffcc66;
        box-shadow: 0 0 12px rgba(255, 204, 102, 0.2);
    }
    .search-box span { font-size: 1.1rem; }
    #gsearchbar {
        background: transparent;
        border: none;
        color: #f0e6d0;
        font-size: 0.9rem;
        width: 260px;
        outline: none;
        font-family: 'DM Sans', sans-serif;
    }
    #gsearchbar::placeholder { color: #6a7a9e; }
    .stats-badge {
        background: #1e2a3a;
        padding: 0.4rem 1rem;
        border-radius: 40px;
        font-size: 0.8rem;
        color: #ffdd99;
        font-weight: 500;
        border: 1px solid rgba(255, 204, 102, 0.3);
    }
    .stats-badge span { color: white; font-weight: bold; margin: 0 4px; }

    .games-wrapper {
        max-width: 1400px;
        margin: 0 auto;
    }

    .section-heading {
        font-family: 'Syne', sans-serif;
        font-size: 0.75rem;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #ffcc66;
        margin: 2rem 0 1rem;
        padding-left: 0.2rem;
        opacity: 0.8;
    }
    .section-heading:first-child { margin-top: 0; }

    .games-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 1rem;
        margin-bottom: 0.5rem;
    }

    .game-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: linear-gradient(115deg, rgba(25, 34, 55, 0.9), rgba(18, 24, 42, 0.95));
        border: 1px solid rgba(255, 204, 102, 0.25);
        border-radius: 24px;
        padding: 0.85rem 1.2rem;
        transition: all 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        text-decoration: none;
        color: inherit;
    }
    .game-card::before {
        content: '';
        position: absolute;
        top: 0; left: -100%;
        width: 100%; height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 204, 102, 0.1), transparent);
        transition: left 0.4s ease;
    }
    .game-card:hover::before { left: 100%; }
    .game-card:hover {
        transform: translateY(-4px) scale(1.01);
        border-color: #ffcc66;
        background: linear-gradient(115deg, #1e2a44, #141c30);
        box-shadow: 0 14px 28px -8px rgba(0,0,0,0.5), 0 0 0 1px rgba(255, 204, 102, 0.2) inset;
    }

    .game-icon {
        font-size: 1.8rem;
        min-width: 46px;
        text-align: center;
        filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }
    .game-info { flex: 1; }
    .game-title {
        font-weight: 600;
        font-size: 0.9rem;
        color: #f5e6c4;
        letter-spacing: -0.2px;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
    }
    .game-type-badge {
        background: rgba(255, 204, 102, 0.18);
        font-size: 0.58rem;
        padding: 2px 8px;
        border-radius: 20px;
        color: #ffdd99;
        font-weight: 500;
    }
    .arrow-hint {
        font-size: 0.72rem;
        color: #6a7a9e;
        margin-top: 1px;
        transition: 0.2s;
    }
    .game-card:hover .arrow-hint {
        color: #ffcc66;
        transform: translateX(3px);
    }

    .no-results {
        text-align: center;
        grid-column: 1 / -1;
        padding: 3rem;
        background: rgba(0,0,0,0.2);
        border-radius: 48px;
        color: #9eafcf;
    }

    .footer {
        text-align: center;
        margin-top: 3rem;
        font-size: 0.7rem;
        color: #5c6e8c;
        border-top: 1px solid rgba(255, 204, 102, 0.15);
        padding-top: 1.8rem;
    }

    @media (max-width: 640px) {
        body { padding: 1rem; }
        .games-grid { grid-template-columns: 1fr; }
        #gsearchbar { width: 160px; }
    }
</style>

function getIcon(name) {
    const n = name.toLowerCase();
    if (n.includes('pac-man') || n.includes('pacman')) return '👻';
    if (n.includes('mario')) return '🍄';
    if (n.includes('tetris')) return '🟦';
    if (n.includes('snake')) return '🐍';
    if (n.includes('chess')) return '♟️';
    if (n.includes('minecraft') || n.includes('mineblocks')) return '⛏️';
    if (n.includes('flappy')) return '🐦';
    if (n.includes('geometry')) return '💠';
    if (n.includes('cookie')) return '🍪';
    if (n.includes('2048')) return '🔢';
    if (n.includes('asteroids')) return '💫';
    if (n.includes('breakout')) return '🧱';
    if (n.includes('run')) return '🏃';
    if (n.includes('frog')) return '🐸';
    if (n.includes('dino')) return '🦕';
    if (n.includes('space')) return '🚀';
    if (n.includes('tank')) return '🪖';
    if (n.includes('doom') || n.includes('combat')) return '💥';
    if (n.includes('soccer') || n.includes('football')) return '⚽';
    if (n.includes('racing') || n.includes('car') || n.includes('drive')) return '🏎️';
    if (n.includes('zombie') || n.includes('dead')) return '🧟';
    if (n.includes('duck')) return '🦆';
    if (n.includes('bloons') || n.includes('balloon')) return '🎈';
    if (n.includes('upload')) return '📤';
    if (n.includes('dark room') || n.includes('adark')) return '🕯️';
    if (n.includes('portal')) return '🌀';
    if (n.includes('stick')) return '🥢';
    if (n.includes('nyan')) return '🌈';
    if (n.includes('idle') || n.includes('clicker')) return '🖱️';
    if (n.includes('hextris')) return '⬡';
    if (n.includes('vex')) return '⚡';
    return '🎮';
}

function render(query = '') {
    const wrapper = document.getElementById('gamesWrapper');
    const q = query.toLowerCase().replace(/ /g, '');
    let totalVisible = 0;
    let html = '';

    for (const section of sections) {
        const filtered = section.games.filter(g =>
            !q || g.name.toLowerCase().replace(/ /g, '').includes(q)
        );
        if (filtered.length === 0) continue;
        totalVisible += filtered.length;

        html += `<div class="section-heading">${section.icon} ${section.label}</div>`;
        html += '<div class="games-grid">';
        for (const game of filtered) {
            html += `
                <a class="game-card" href="${game.href}">
                    <div class="game-icon">${getIcon(game.name)}</div>
                    <div class="game-info">
                        <div class="game-title">
                            ${escHtml(game.name)}
                            <span class="game-type-badge">${section.type}</span>
                        </div>
                        <div class="arrow-hint">▶ play now</div>
                    </div>
                </a>`;
        }
        html += '</div>';
    }

    if (!html) {
        html = '<div class="no-results">✨ no games found — try a different search ✨</div>';
    }

    wrapper.innerHTML = html;
    document.getElementById('visibleCount').textContent = totalVisible;
}

function escHtml(str) {
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
}

let debounce;
document.getElementById('gsearchbar').addEventListener('input', e => {
    clearTimeout(debounce);
    debounce = setTimeout(() => render(e.target.value.trim()), 180);
});

render();
</script>
